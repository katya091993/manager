<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лайв-казино — Дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>

:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2235;--border:#2a2f45;--border2:#353b55;--text:#e8eaf6;--text2:#8b91b3;--text3:#555d80;--acc:#6c63ff;--acc2:#8b84ff;--green:#4ede8a;--red:#ff5c7a;--amber:#f0a44a;--blue:#60aaff;--purple:#b47aff;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;font-size:14px}
body{min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.hdr-logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--acc),#ff6b9d);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.hdr-logo h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-logo span{color:var(--text2);font-weight:500}
.hdr-r{display:flex;align-items:center;gap:10px}
.save-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:20px;transition:all .3s;background:rgba(78,222,138,.1);color:var(--green);border:1px solid rgba(78,222,138,.2)}
.save-badge.saving{background:rgba(240,164,74,.1);color:var(--amber);border-color:rgba(240,164,74,.2)}
.save-badge.error{background:rgba(255,92,122,.1);color:var(--red);border-color:rgba(255,92,122,.2)}
.hsel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;padding:6px 10px;border-radius:8px;outline:none;cursor:pointer}
.hsrch{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;padding:6px 12px;border-radius:8px;outline:none;width:180px}
.hsrch::placeholder{color:var(--text3)}
.hsrch:focus,.hsel:focus{border-color:var(--acc)}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:14px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:color .15s;margin-bottom:-1px}
.ntab:hover{color:var(--text2)}
.ntab.active{color:var(--text);border-bottom-color:var(--acc)}
.ntab .nb{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(108,99,255,.25);color:var(--acc2)}
.page{display:none;padding:24px 28px}
.page.active{display:block}
.wk-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.mpill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;background:linear-gradient(135deg,rgba(108,99,255,.3),rgba(180,122,255,.3));color:var(--acc2);border:1px solid rgba(108,99,255,.3)}
.wtab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s}
.wtab:hover{border-color:var(--border2);color:var(--text2)}
.wtab.active{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:var(--acc2)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--al,linear-gradient(90deg,var(--acc),var(--acc2)))}
.sc .sl{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:6px}
.sc .sv{font-size:26px;font-weight:800;line-height:1}
.sc .ss{font-size:11px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.ftab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s}
.ftab:hover{color:var(--text2);border-color:var(--border2)}
.ftab.active{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:var(--acc2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card[data-g="stol"]     {background:linear-gradient(160deg,#0d2440 0%,var(--bg2) 60%)}
.card[data-g="analytics"]{background:linear-gradient(160deg,#0d2419 0%,var(--bg2) 60%)}
.card[data-g="svalka"]   {background:linear-gradient(160deg,#251a08 0%,var(--bg2) 60%)}
.card[data-g="support"]  {background:linear-gradient(160deg,#1c1030 0%,var(--bg2) 60%)}
.ctop{padding:16px 18px 0}
.chdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ava{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.card[data-g="stol"]     .ava{background:rgba(96,170,255,.2);color:#60aaff;border:1px solid rgba(96,170,255,.3)}
.card[data-g="analytics"].ava{background:rgba(78,222,138,.2);color:#4ede8a;border:1px solid rgba(78,222,138,.3)}
.card[data-g="svalka"]   .ava{background:rgba(240,164,74,.2);color:#f0a44a;border:1px solid rgba(240,164,74,.3)}
.card[data-g="support"]  .ava{background:rgba(180,122,255,.2);color:#b47aff;border:1px solid rgba(180,122,255,.3)}
.cname{font-size:14px;font-weight:700}
.crole{font-size:11px;color:var(--text3);font-weight:500;margin-top:1px}
.spill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:4px}
.pbtn{margin-left:auto;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;font-family:'Manrope',sans-serif;flex-shrink:0}
.pbtn:hover{border-color:var(--acc);color:var(--acc2)}
.ctabs{display:flex;border-bottom:1px solid var(--border);padding:0 18px;background:rgba(0,0,0,.15)}
.ctab-btn{padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:color .15s}
.ctab-btn:hover{color:var(--text2)}
.ctab-btn.active{color:var(--text);border-bottom-color:var(--acc)}
.cdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cpanel{display:none;padding:14px 18px 16px}
.cpanel.active{display:block}
.pw{margin-bottom:12px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.pt{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s}
.kr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.kb .kl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.kb input[type=number]{width:100%;border:none;background:transparent;font-size:16px;font-weight:700;color:var(--text);text-align:center;outline:none;font-family:'JetBrains Mono',monospace}
.eb{display:flex;align-items:center;gap:8px;background:rgba(255,92,122,.08);border:1px solid rgba(255,92,122,.3);border-radius:8px;padding:8px 12px;margin-bottom:10px}
.eb .el{font-size:11px;color:#ff8fa3;flex:1;font-weight:600}
.eb input[type=number]{width:50px;border:1px solid rgba(255,92,122,.4);border-radius:6px;background:rgba(255,92,122,.1);font-size:14px;font-weight:700;color:var(--red);text-align:center;outline:none;padding:3px 4px;font-family:'JetBrains Mono',monospace}
.eb.none{background:rgba(255,255,255,.03);border-color:var(--border)}
.eb.none .el{color:var(--text3)}
.eb.none input[type=number]{border-color:var(--border);color:var(--text2);background:transparent}
.stit{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px;display:flex;align-items:center;gap:5px}
.ci{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);position:relative}
.ci:last-child{border-bottom:none}
.ci input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:var(--acc);width:14px;height:14px}
.ci .it{font-size:12px;color:var(--text2);flex:1;line-height:1.5;user-select:none;cursor:pointer;font-weight:500}
.ci.done .it{text-decoration:line-through;color:var(--text3)}
.ci .ta{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.ci:hover .ta{opacity:1}
.tbtn{border:none;background:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:5px;color:var(--text3);line-height:1;transition:all .15s}
.tbtn:hover{background:var(--bg3);color:var(--text2)}
.tbtn.del:hover{background:rgba(255,92,122,.1);color:var(--red)}
.er{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border)}
.er input[type=text]{flex:1;background:var(--bg3);border:1px solid var(--acc);color:var(--text);font-family:'Manrope',sans-serif;font-size:12px;padding:4px 8px;border-radius:6px;outline:none}
.er .eb2{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600}
.er .eb2:first-of-type{border-color:var(--green);color:var(--green)}
.atbtn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:6px 0;margin-top:2px;font-family:'Manrope',sans-serif;font-weight:600;transition:color .15s}
.atbtn:hover{color:var(--acc2)}
.cmtw textarea{width:100%;font-size:12px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg3);color:var(--text);font-family:'Manrope',sans-serif;resize:vertical;min-height:54px;line-height:1.5;outline:none;transition:border-color .15s}
.cmtw textarea:focus{border-color:var(--acc)}
.cmtw textarea::placeholder{color:var(--text3)}
.mr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.ml{font-size:11px;color:var(--text3);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.mbw{width:70px;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0}
.mb{height:100%;border-radius:3px;transition:width .4s}
.mi{width:46px;border:1px solid var(--border);border-radius:5px;padding:3px 4px;text-align:center;font-size:11px;font-weight:700;background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;outline:none}
.mi:focus{border-color:var(--acc)}
.mtr{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.mtl{font-size:11px;font-weight:700;color:var(--text2)}
.nf{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ntr{display:flex;gap:6px;flex-wrap:wrap}
.ntbtn{font-size:11px;padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;color:var(--text3);font-weight:600;font-family:'Manrope',sans-serif;display:flex;align-items:center;gap:4px;transition:all .15s}
.ntbtn.sel-achieve{background:rgba(78,222,138,.15);border-color:rgba(78,222,138,.4);color:var(--green)}
.ntbtn.sel-remark{background:rgba(255,92,122,.15);border-color:rgba(255,92,122,.4);color:var(--red)}
.ntbtn.sel-idea{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:var(--acc2)}
.nta{font-size:12px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg3);color:var(--text);font-family:'Manrope',sans-serif;resize:none;min-height:56px;line-height:1.5;outline:none;width:100%;transition:border-color .15s}
.nta:focus{border-color:var(--acc)}
.nta::placeholder{color:var(--text3)}
.nadd{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--acc);background:rgba(108,99,255,.15);color:var(--acc2);cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600;align-self:flex-end;transition:all .15s}
.nadd:hover{background:rgba(108,99,255,.25)}
.nlst{display:flex;flex-direction:column;gap:7px}
.ni{border-radius:8px;padding:9px 11px;position:relative}
.ni.na{background:rgba(78,222,138,.08);border:1px solid rgba(78,222,138,.2)}
.ni.nr{background:rgba(255,92,122,.08);border:1px solid rgba(255,92,122,.2)}
.ni.nid{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.25)}
.ni-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.nibdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;display:flex;align-items:center;gap:3px}
.na .nibdg{background:rgba(78,222,138,.2);color:var(--green)}
.nr .nibdg{background:rgba(255,92,122,.2);color:var(--red)}
.nid .nibdg{background:rgba(108,99,255,.25);color:var(--acc2)}
.nidate{font-size:10px;color:var(--text3);margin-left:auto;font-family:'JetBrains Mono',monospace}
.nitxt{font-size:12px;line-height:1.5;font-weight:500}
.na .nitxt{color:#a0f5c8}.nr .nitxt{color:#ffaab8}.nid .nitxt{color:#c4c0ff}
.nidel{position:absolute;top:7px;right:7px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);opacity:0;transition:opacity .15s;padding:2px 4px;border-radius:4px}
.ni:hover .nidel{opacity:1}
.nidel:hover{background:rgba(255,92,122,.1);color:var(--red)}
.nemp{font-size:12px;color:var(--text3);text-align:center;padding:20px 0;font-style:italic}
.sbdg{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:700;white-space:nowrap;letter-spacing:.2px}
.epkr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.epill{display:flex;align-items:center;gap:7px;padding:7px 14px 7px 9px;border-radius:24px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .2s}
.epill:hover{border-color:var(--border2);background:var(--bg3)}
.epill.active{border-width:1.5px}
.epav{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.epnm{font-size:12px;font-weight:600}
.indlay{display:grid;grid-template-columns:230px 1fr;gap:16px;align-items:start}
.indsb{display:flex;flex-direction:column;gap:12px}
.indpro{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;position:relative;overflow:hidden}
.indpro::before{content:'';position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(180,122,255,.1))}
.ipav{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;margin:0 auto 10px;position:relative}
.ipnm{font-size:15px;font-weight:700;margin-bottom:2px}
.iprl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:12px}
.isg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.isc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.isl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.isv{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace}
.indwn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.wnt{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.iwb{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text3);margin-bottom:3px;transition:all .15s;font-weight:500}
.iwb:hover{background:var(--bg3);color:var(--text2)}
.iwb.active{background:rgba(108,99,255,.15);color:var(--text);border:1px solid rgba(108,99,255,.3)}
.wkp{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.indmn{display:flex;flex-direction:column;gap:12px}
.indsec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.indsec-h{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;background:rgba(255,255,255,.02);transition:background .15s}
.indsec-h:hover{background:rgba(255,255,255,.04)}
.indsec-h h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.indsec-h .ti-chevron-down{font-size:14px;color:var(--text3);transition:transform .2s}
.indsec-h.open .ti-chevron-down{transform:rotate(180deg)}
.indsec-b{padding:14px 18px}
.indsec-b.col{display:none}
.nflt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.nfsel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;padding:7px 12px;border-radius:8px;outline:none;cursor:pointer}
.ngrd{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ncp{border-radius:var(--r);padding:14px 16px;position:relative}
.ncp.na{background:rgba(78,222,138,.07);border:1px solid rgba(78,222,138,.2)}
.ncp.nr{background:rgba(255,92,122,.07);border:1px solid rgba(255,92,122,.2)}
.ncp.nid{background:rgba(108,99,255,.09);border:1px solid rgba(108,99,255,.25)}
.nce{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ncav{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.ncnm{font-size:12px;font-weight:700}
.ncrl{font-size:10px;color:var(--text3)}
.ncbdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:auto;display:flex;align-items:center;gap:3px}
.na .ncbdg{background:rgba(78,222,138,.2);color:var(--green)}
.nr .ncbdg{background:rgba(255,92,122,.2);color:var(--red)}
.nid .ncbdg{background:rgba(108,99,255,.25);color:var(--acc2)}
.nctxt{font-size:12px;line-height:1.5;font-weight:500;margin-bottom:8px}
.na .nctxt{color:#a0f5c8}.nr .nctxt{color:#ffaab8}.nid .nctxt{color:#c4c0ff}
.ncdt{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.ncdel{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);opacity:0;transition:opacity .15s;padding:2px 4px;border-radius:4px}
.ncp:hover .ncdel{opacity:1}
.ncdel:hover{background:rgba(255,92,122,.1);color:var(--red)}
.twrp{overflow-x:auto;margin-top:4px}
.stbl{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.stbl th{text-align:left;padding:8px 12px;font-weight:700;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
.stbl td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;font-weight:500}
.stbl tbody tr:hover td{background:rgba(255,255,255,.02)}

<body>
<div id="lo"><div class="lspin"></div><div class="ltxt">Загружаем данные...</div></div>

  <div class="ftabs">

    <span class="ftab" style="border-color:rgba(240,164,74,.3);color:#f0a44a" onclick="sg('svalka',this)">● Свалка</span>

</div>

    <select class="nfsel" id="nfe" onchange="rnp()"><option value="all">Все сотрудники</option></select>

</div>
<div class="page" id="page-summary"><div id="ss"></div></div>
<div class="page" id="page-eval">
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
    <span class="lbdg" style="background:rgba(255,92,122,.15);color:#ff5c7a;border:1px solid rgba(255,92,122,.3)">Зона роста &lt;50%</span>
    <span class="lbdg" style="background:rgba(240,164,74,.15);color:#f0a44a;border:1px solid rgba(240,164,74,.3)">Норма 50-70%</span>
    <span class="lbdg" style="background:rgba(78,222,138,.15);color:#4ede8a;border:1px solid rgba(78,222,138,.3)">Хорошо 70-85%</span>

  </div>

<script>

const MO=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const EMP=[
  {name:"Настя",    role:"Стол",                  ini:"НА",col:"rgba(96,170,255,.2)",tc:"#60aaff",g:"stol"},
  {name:"Вова",     role:"Стол",                  ini:"ВО",col:"rgba(96,170,255,.2)",tc:"#60aaff",g:"stol"},
  {name:"Артём",    role:"Стол",                  ini:"АР",col:"rgba(96,170,255,.2)",tc:"#60aaff",g:"stol"},
  {name:"Саша",     role:"Стол",                  ini:"СА",col:"rgba(96,170,255,.2)",tc:"#60aaff",g:"stol"},
  {name:"Влад",     role:"Аналитика / Почта",     ini:"ВЛ",col:"rgba(78,222,138,.2)",tc:"#4ede8a",g:"analytics"},
  {name:"Андрей Ш.",role:"Аналитика / Почта",     ini:"АШ",col:"rgba(78,222,138,.2)",tc:"#4ede8a",g:"analytics"},
  {name:"Марк",     role:"Аналитика лайв-казино", ini:"МК",col:"rgba(78,222,138,.2)",tc:"#4ede8a",g:"analytics"},
  {name:"Оля",      role:"Свалка",                ini:"ОЛ",col:"rgba(240,164,74,.2)", tc:"#f0a44a",g:"svalka"},
  {name:"Андрей Г.",role:"Поддержка / Пуши",      ini:"АГ",col:"rgba(180,122,255,.2)",tc:"#b47aff",g:"support"},
];
const GC={"stol":"#60aaff","analytics":"#4ede8a","svalka":"#f0a44a","support":"#b47aff"};
const DT={
  stol:["Обработка счетов с текучки из чатов","Разбор оппозитов + проверка выигрышей","Контроль кассовые проверки (Сторонка/Казино)","Разбор партнёрских счетов от b2b","СБ переводы покер/шовники","Доскональная обработка счетов из оппозитных и лайв пушей","Оперативные ответы на обращения от контроля","Роспись просадок","Выявление и анализ подозрительных игроков, донесение до старших","Перенос почты от партнёров, обработка по возможности","Обработка касс и партнерок по возможности"],
  analytics:["Обработка игроков с почты (мульты, хвосты, подозрительные кассы)","Поиск и обработка подозрительных касс, партнёрок фин. групп","Обработка непроверенных касс и партнёрок через чат «Кассы и партнёрки»","Обработка игроков с чата «Разбор игроков до скелета»","Помощь в обработке счетов на «Свалке» при зависаниях","Проверка корректности ответов сотрудников из документа «Свалка»","Просмотр крупных пушей для анализа и создания новых пушей","При нехватке сотрудников — помощь на текучке и пушах","Корректное внесение данных и проверка всех документов","Анализ и выявление плохих игроков через просадки (оппозиты)"],
  mark:["Просмотр и роспись просадок по лайв-казино, проверка выигрышей","Обработка счетов из лайв пушей, поиск нечестных выигрышей","Составление отчётов о крупных выигрышах и подозрительной активности","Просмотр писем от партнёров (подсчёт карт, сговор с дилерами)","Просмотр новых игр, анализ механик и уязвимостей","Помощь контролю и лайв столу со спорными счетами","Анализ игроков, написание ТЗ, тестирование новых пушей","Активное участие в обработке оппозитных и бонусных счетов"],
  svalka:["Полная проверка всех счетов в документе «Свалка»","Обработка мультов","Обработка до скелета","Проверка корректности ответов сотрудников общего контроля","Обработка счетов с ошибочными ответами (мошенничество лайв-казино)","Работа с игроками с почты — выявление ошибок основного контроля"],
  support:["Обработка текучки и пушей (в дни, когда отсутствует стол)","Помощь на текучке и пушах в течение дня","Обработка крупных пушей (Лайв 5%, Crash и др.)","Помощь на свалке при необходимости","Помощь на почте при необходимости"],
};
const DC=[{name:"Точность обработки счетов",weight:30},{name:"Выявление подозрительных",weight:25},{name:"Коммуникация",weight:20},{name:"Инициативность",weight:15},{name:"Ответственность",weight:10}];
const NT={achieve:{label:"Достижение",icon:"ti-star",cls:"na"},remark:{label:"Замечание",icon:"ti-alert-circle",cls:"nr"},idea:{label:"Идея",icon:"ti-bulb",cls:"nid"}};
const NTK=["achieve","remark","idea"];
function ek(ei){return EMP[ei].g==='analytics'&&EMP[ei].name==='Марк'?'mark':EMP[ei].g;}
function gw(m){
  const y=2026,f=new Date(y,m,1),l=new Date(y,m+1,0),w=[];let c=new Date(f);
  const fmt=d=>`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}`;
  while(c<=l){const e=new Date(Math.min(c.getTime()+6*86400000,l.getTime()));w.push({label:`${fmt(c)}–${fmt(e)}`});c=new Date(e.getTime()+86400000);}
  return w;
}
function bc(v){return v>=85?'#4ede8a':v>=70?'#a8f0c6':v>=50?'#f0a44a':v>0?'#ff5c7a':'#555d80';}
function gs(p){
  if(p<=0)return{label:"Нет данных",bg:"rgba(255,255,255,.06)",tc:"#555d80"};
  if(p<50)return{label:"Зона роста",bg:"rgba(255,92,122,.15)",tc:"#ff5c7a"};
  if(p<70)return{label:"Норма",bg:"rgba(240,164,74,.15)",tc:"#f0a44a"};
  if(p<85)return{label:"Хорошо",bg:"rgba(78,222,138,.15)",tc:"#4ede8a"};
  return{label:"Отлично",bg:"rgba(96,170,255,.2)",tc:"#60aaff"};
}
function fd(d){return`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;}
function ce(m,ei){
  const sc=EV[m]&&EV[m][ei]?EV[m][ei]:[],tw=CR.reduce((s,c)=>s+c.weight,0);if(!tw)return 0;
  let sum=0,fw=0;CR.forEach((c,ci)=>{if((sc[ci]||0)>0){sum+=(sc[ci]||0)*c.weight;fw+=c.weight;}});return fw?Math.round(sum/fw):0;
}
let CR=[...DC.map(c=>({...c}))];
let EV=Array.from({length:12},()=>EMP.map(()=>CR.map(()=>0)));
let NO=EMP.map(()=>[]);
let ST=EMP.map((_,ei)=>Array.from({length:6},()=>({tasks:DT[ek(ei)].map(()=>false),tt:[...DT[ek(ei)]],s:0,p:0,e:0,cm:''})));
let slt=EMP.map(()=>'achieve');
let cm=4,cw=0,cg='all',sq='',ce2=0;
const ws=(ei,wi)=>ST[ei][wi];
const SK='lc_v10';
let stmr=null;
function ssi(s){const el=document.getElementById('si');if(!el)return;el.className='save-badge'+' '+s;el.innerHTML=s==='saving'?'<i class="ti ti-loader"></i> Сохраняем...':s==='saved'?'<i class="ti ti-device-floppy"></i> Сохранено':'<i class="ti ti-alert-circle"></i> Ошибка';}
function sv(){clearTimeout(stmr);ssi('saving');stmr=setTimeout(()=>{try{localStorage.setItem(SK,JSON.stringify({ST,EV,NO,CR,slt,cm,_ts:Date.now()}));ssi('saved');}catch(e){ssi('error');}setTimeout(_fbPush,300);},700);}
function ld(){try{const r=localStorage.getItem(SK);if(!r)return;const d=JSON.parse(r);if(d.ST)ST=d.ST;if(d.EV)EV=d.EV;if(d.NO){if(Array.isArray(d.NO)){NO=d.NO;}else{NO=Object.values(d.NO);}while(NO.length<EMP.length)NO.push([]);NO.forEach((n,i)=>{if(!Array.isArray(n))NO[i]=[];});}if(d.CR)CR=d.CR;if(d.slt)slt=d.slt;if(d.cm!=null)cm=d.cm;for(let m=0;m<12;m++){if(!EV[m])EV[m]=EMP.map(()=>CR.map(()=>0));EMP.forEach((_,ei)=>{if(!EV[m][ei])EV[m][ei]=CR.map(()=>0);while(EV[m][ei].length<CR.length)EV[m][ei].push(0);});}}catch(e){}}
(function init(){ld();if(!Array.isArray(NO)){try{NO=Array.from({length:EMP.length},()=>[]);}catch(e){}}while(NO.length<EMP.length)NO.push([]);document.getElementById('ms').value=cm;const sel=document.getElementById('nfe');EMP.forEach((e,i)=>{const o=document.createElement('option');o.value=i;o.textContent=e.name;sel.appendChild(o);});rwt();rss();rg();rsm();rc();re();ugb();document.getElementById('lo').style.display='none';document.getElementById('app').style.display='block';})();
function st(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');el.classList.add('active');if(id==='individual')ri();if(id==='notes')rnp();if(id==='summary')rsm();if(id==='eval'){rc();re();}if(id==='meeting')renderMeeting();if(id==='analysis')renderAnalysis();}
function ugb(){if(!Array.isArray(NO))return;const t=NO.reduce((s,ns)=>s+(Array.isArray(ns)?ns:[]).filter(n=>n.month===cm).length,0);const b=document.getElementById('gnb');if(b){b.textContent=t||'';b.style.display=t?'inline':'none';}}
function rwt(){const w=gw(cm);let h=`<span class="mpill"><i class="ti ti-calendar"></i> ${MO[cm]} 2026</span>`;w.forEach((wk,i)=>{h+=`<span class="wtab${i===cw?' active':''}" onclick="sw(${i},this)">Нед.${i+1} · ${wk.label}</span>`;});document.getElementById('wt').innerHTML=h;}
function rss(){const w=gw(cm);let tS=0,tP=0,tO=0,wS=0,wP=0,wO=0;EMP.forEach((_,ei)=>w.forEach((_,wi)=>{const s=ws(ei,wi);tS+=s.s;tP+=s.p;tO+=s.e;if(wi===cw){wS+=s.s;wP+=s.p;wO+=s.e;}}));document.getElementById('sts').innerHTML=`<div class="sc" style="--al:linear-gradient(90deg,#60aaff,#b47aff)"><div class="sl">Счетов (месяц)</div><div class="sv" style="color:#60aaff">${tS}</div><div class="ss">нед.${cw+1}: ${wS}</div></div><div class="sc" style="--al:linear-gradient(90deg,#f0a44a,#ff5c7a)"><div class="sl">Подозрит. (месяц)</div><div class="sv" style="color:${tP>0?'#f0a44a':'#555d80'}">${tP}</div><div class="ss">нед.${cw+1}: ${wP}</div></div><div class="sc" style="--al:linear-gradient(90deg,#ff5c7a,#ff8fa3)"><div class="sl">Ошибки (месяц)</div><div class="sv" style="color:${tO>0?'#ff5c7a':'#555d80'}">${tO}</div><div class="ss">нед.${cw+1}: ${wO}</div></div>`;}
function nih(n,ei){const nt=NT[n.type];return`<div class="ni ${nt.cls}"><div class="ni-top"><span class="nibdg"><i class="ti ${nt.icon}"></i> ${nt.label}</span><span class="nidate">${n.date}</span></div><div class="nitxt">${n.text}</div><button class="nidel" onclick="dn(${ei},${n.id})"><i class="ti ti-x"></i></button></div>`;}
function rg(){const q=sq.toLowerCase(),w=gw(cm);let h='';
EMP.forEach((emp,ei)=>{
if(cg!=='all'&&emp.g!==cg)return;if(q&&!emp.name.toLowerCase().includes(q))return;
const s=ws(ei,cw),dn2=s.tasks.filter(Boolean).length,tot=s.tt.length,pct=tot?Math.round(dn2/tot*100):0;
const fc=pct===100?'#4ede8a':pct>=50?'#f0a44a':'#ff5c7a';
const he=s.e>0,ep=ce(cm,ei),est=gs(ep);
const mn=(NO[ei]||[]).filter(n=>n.month===cm),hd=mn.length>0;
const dc=mn.some(n=>n.type==='remark')?'#ff5c7a':mn.some(n=>n.type==='idea')?'#8b84ff':'#4ede8a';
const items=s.tt.map((t,ti)=>`<div class="ci${s.tasks[ti]?' done':''}" id="ci-${ei}-${ti}"><input type="checkbox" ${s.tasks[ti]?'checked':''} onchange="tt(${ei},${ti},this)"><span class="it" ondblclick="se(${ei},${ti},this)">${t}</span><span class="ta"><button class="tbtn" title="Редактировать" onclick="seby(${ei},${ti})"><i class="ti ti-pencil"></i></button><button class="tbtn del" title="Удалить" onclick="dt(${ei},${ti})"><i class="ti ti-trash"></i></button></span></div>`).join('');
const mb=CR.map((c,ci)=>{const v=EV[cm]&&EV[cm][ei]?EV[cm][ei][ci]||0:0,col=bc(v);return`<div class="mr"><span class="ml" title="${c.name}">${c.name}</span><div class="mbw"><div class="mb" style="width:${v}%;background:${col}"></div></div><input class="mi" type="number" min="0" max="100" value="${v||''}" placeholder="—" onchange="ses(${cm},${ei},${ci},this.value)" style="color:${v>0?col:'#555d80'}"></div>`;}).join('');

</td></tr>`;document.getElementById('eb2').innerHTML=rows;const ex=grands.filter(t=>t>85).length,go=grands.filter(t=>t>=70&&t<=85).length,no=grands.filter(t=>t>=50&&t<70).length,ri=grands.filter(t=>t>0&&t<50).length;document.getElementById('es').innerHTML=`<div class="sc" style="--al:linear-gradient(90deg,#60aaff,#8b84ff)"><div class="sl">Отлично (&gt;85%)</div><div class="sv" style="color:#60aaff">${ex}</div></div><div class="sc" style="--al:linear-gradient(90deg,#4ede8a,#a8f0c6)"><div class="sl">Хорошо (70–85%)</div><div class="sv" style="color:#4ede8a">${go}</div></div><div class="sc" style="--al:linear-gradient(90deg,#f0a44a,#ffc87a)"><div class="sl">Норма (50–70%)</div><div class="sv" style="color:#f0a44a">${no}</div></div><div class="sc" style="--al:linear-gradient(90deg,#ff5c7a,#ff8fa3)"><div class="sl">Зона роста (&lt;50%)</div><div class="sv" style="color:#ff5c7a">${ri}</div></div><div class="sc" style="--al:linear-gradient(90deg,#555d80,#8b91b3)"><div class="sl">Среднее отдела</div><div class="sv" style="color:${gst.tc}">${ga>0?ga+'%':'—'}</div></div>`;}

var NT2 = {
  achieve: {label:"Достижение", icon:"ti-star",         bg:"rgba(78,222,138,.08)", bc:"rgba(78,222,138,.2)",  tc:"#4ede8a", ibg:"rgba(78,222,138,.2)"},
  remark:  {label:"Замечание",  icon:"ti-alert-circle", bg:"rgba(255,92,122,.08)", bc:"rgba(255,92,122,.2)",  tc:"#ff5c7a", ibg:"rgba(255,92,122,.2)"},
  idea:    {label:"Идея",       icon:"ti-bulb",         bg:"rgba(108,99,255,.1)",  bc:"rgba(108,99,255,.25)", tc:"#8b84ff", ibg:"rgba(108,99,255,.2)"}
};
var mCurEmp = "all";

function mGetTasks(ei) {
  if (ST && ST[ei] && ST[ei][0]) return ST[ei][0].taskTexts || ST[ei][0].tt || DT[ek(ei)];
  return DT[ek(ei)];
}
function mGetDone(ei, wi, ti) {
  if (!ST || !ST[ei] || !ST[ei][wi]) return false;
  var s = ST[ei][wi];
  return Array.isArray(s.tasks) ? !!s.tasks[ti] : false;
}
function mGetKPI(ei, wi, k) {
  if (!ST || !ST[ei] || !ST[ei][wi]) return 0;
  var s = ST[ei][wi];
  if (k === "s") return s.s || 0;
  if (k === "p") return s.p || 0;
  if (k === "e") return s.e || 0;
  return 0;
}
function mGetComment(ei, wi) {
  if (!ST || !ST[ei] || !ST[ei][wi]) return "";
  var s = ST[ei][wi]; return s.cm || s.comment || "";
}
function mGetEval(ei, ci) {
  if (!EV || !EV[cm] || !EV[cm][ei]) return 0;
  return EV[cm][ei][ci] || 0;
}
function mGetNotes(ei) {
  if (!NO || !NO[ei]) return [];
  return NO[ei].filter(function(n) { return n.month === cm; });
}
function mCalcEval(ei) {
  var cr = CR || DC, tw = cr.reduce(function(s,c){return s+c.weight;},0);
  if (!tw) return 0;
  var sum = 0, fw = 0;
  cr.forEach(function(c,ci){ var v = mGetEval(ei,ci); if(v>0){sum+=v*c.weight;fw+=c.weight;} });
  return fw ? Math.round(sum/fw) : 0;
}
function mStatus(p) {
  if (p <= 0) return {label:"Нет данных", bg:"rgba(255,255,255,.06)", tc:"#555d80"};
  if (p < 50)  return {label:"Зона роста", bg:"rgba(255,92,122,.15)",  tc:"#ff5c7a"};
  if (p < 70)  return {label:"Норма",      bg:"rgba(240,164,74,.15)",  tc:"#f0a44a"};
  if (p < 85)  return {label:"Хорошо",     bg:"rgba(78,222,138,.15)",  tc:"#4ede8a"};
  return              {label:"Отлично",    bg:"rgba(96,170,255,.2)",   tc:"#60aaff"};
}

// ── MEETING ───────────────────────────────────────────────────────
function renderMeeting() { buildMeetingUI(); }

function buildMeetingUI() {
  var mc = document.getElementById("meetingContent");
  if (!mc) return;
  mc.innerHTML = "";
  var w = gw(cm);

  // Header
  var hdr = document.createElement("div");
  hdr.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px";
  var info = document.createElement("div");
  info.className = "m-month-note"; info.style.marginBottom = "0";
  info.innerHTML = "<i class=\"ti ti-calendar\"></i> " + MO[cm] + " 2026";
  var btn = document.createElement("button");
  btn.style.cssText = "display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;border:1px solid var(--acc);background:rgba(108,99,255,.15);color:var(--acc2);cursor:pointer";
  btn.innerHTML = "<i class=\"ti ti-refresh\" style=\"font-size:14px\"></i> Обновить данные";
  btn.onclick = function() { buildMeetingUI(); };
  hdr.appendChild(info); hdr.appendChild(btn); mc.appendChild(hdr);

  // Pills
  var pw = document.createElement("div");
  pw.style.cssText = "display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px";
  var ap = document.createElement("div");
  ap.className = "ep-all" + (mCurEmp === "all" ? " active" : "");
  ap.innerHTML = "<i class=\"ti ti-users\" style=\"font-size:13px\"></i> Все";
  ap.onclick = function() { mCurEmp = "all"; buildMeetingUI(); };
  pw.appendChild(ap);
  EMP.forEach(function(emp, ei) {
    var pill = document.createElement("div");
    pill.className = "m-epill" + (mCurEmp === ei ? " active" : "");
    if (mCurEmp === ei) { pill.style.borderColor = emp.tc; pill.style.background = emp.col; }
    pill.innerHTML = "<div class=\"m-epav\" style=\"background:" + emp.col + ";color:" + emp.tc + "\">" + emp.ini + "</div>"
      + "<span style=\"color:" + (mCurEmp === ei ? emp.tc : "var(--text3)") + "\">" + emp.name + "</span>";
    (function(i) { pill.onclick = function() { mCurEmp = i; buildMeetingUI(); }; })(ei);
    pw.appendChild(pill);
  });
  mc.appendChild(pw);

  // Content
  var body = document.createElement("div");
  body.innerHTML = (mCurEmp === "all") ? buildAllMeeting(w) : buildSingleMeeting(mCurEmp, w);
  mc.appendChild(body);
}

function buildAllMeeting(w) {
  var h = "<div class=\"all-grid\">";
  EMP.forEach(function(emp, ei) {
    var tasks = mGetTasks(ei), tE = 0, taskMiss = 0;
    tasks.forEach(function(t, ti) {
      var missed = 0;
      w.forEach(function(_, wi) { if (!mGetDone(ei, wi, ti)) missed++; });
      if (missed > 0) taskMiss++;
    });
    w.forEach(function(_, wi) { tE += mGetKPI(ei, wi, "e"); });
    var notes = mGetNotes(ei), remarks = notes.filter(function(n) { return n.type === "remark"; });
    var ep = mCalcEval(ei), est = mStatus(ep);
    var hasIss = taskMiss > 0 || tE > 0 || remarks.length > 0 || (ep > 0 && ep < 70);
    var gc = GC[emp.g], issHtml = "";
    if (hasIss) {
      issHtml = "<div style=\"display:flex;flex-direction:column;gap:3px\">";
      if (taskMiss > 0) issHtml += "<div class=\"issue-row\"><i class=\"ti ti-checkbox\" style=\"color:#ff5c7a\"></i> " + taskMiss + " задач пропускалась</div>";
      if (tE > 0) issHtml += "<div class=\"issue-row\"><i class=\"ti ti-alert-triangle\" style=\"color:#ff5c7a\"></i> " + tE + " ошибок</div>";
      if (remarks.length > 0) issHtml += "<div class=\"issue-row\"><i class=\"ti ti-alert-circle\" style=\"color:#ff5c7a\"></i> " + remarks.length + " замечаний</div>";
      if (ep > 0 && ep < 70) issHtml += "<div class=\"issue-row\"><i class=\"ti ti-trending-down\" style=\"color:#f0a44a\"></i> Зона роста</div>";
      issHtml += "</div>";
    } else { issHtml = "<div class=\"no-issue\"><i class=\"ti ti-circle-check\"></i> Нареканий нет</div>"; }
    h += "<div class=\"m-mini\" onclick=\"mCurEmp=" + ei + ";buildMeetingUI()\" style=\"border-left:3px solid " + gc + "\">"
      + "<div class=\"m-mini-hdr\"><div class=\"m-mini-ava\" style=\"background:" + emp.col + ";color:" + emp.tc + "\">" + emp.ini + "</div>"
      + "<div style=\"flex:1;min-width:0\"><div class=\"m-mini-name\" style=\"color:" + emp.tc + "\">" + emp.name + "</div><div class=\"m-mini-role\">" + emp.role + "</div></div>"
      + (ep > 0 ? "<span class=\"m-mini-score\" style=\"background:" + est.bg + ";color:" + est.tc + "\">" + ep + "% " + est.label + "</span>" : "")
      + "</div>" + issHtml + "</div>";
  });
  return h + "</div>";
}

function buildSingleMeeting(ei, w) {
  var emp = EMP[ei], tasks = mGetTasks(ei), cr = CR || DC;
  var tS = 0, tP = 0, tE = 0;
  var taskStats = tasks.map(function(t) { return {name:t, missed:[], done:[]}; });
  w.forEach(function(_, wi) {
    tS += mGetKPI(ei,wi,"s"); tP += mGetKPI(ei,wi,"p"); tE += mGetKPI(ei,wi,"e");
    tasks.forEach(function(_,ti) { if(mGetDone(ei,wi,ti)) taskStats[ti].done.push(wi+1); else taskStats[ti].missed.push(wi+1); });
  });
  var ep = mCalcEval(ei), est = mStatus(ep);
  var notes = mGetNotes(ei);
  var remarks  = notes.filter(function(n){return n.type==="remark";});
  var achieves = notes.filter(function(n){return n.type==="achieve";});
  var ideas    = notes.filter(function(n){return n.type==="idea";});
  var missed   = taskStats.filter(function(t){return t.missed.length>0;}).sort(function(a,b){return b.missed.length-a.missed.length;});
  var stable   = taskStats.filter(function(t){return t.missed.length===0;});
  var gc = GC[emp.g], tps = [];

  missed.slice(0,4).forEach(function(t) {
    var pct = Math.round(t.done.length/w.length*100);
    tps.push({icon:"ti-checkbox", col:"#ff5c7a", text: t.name + " — не выполнена в " + t.missed.length + " из " + w.length + " недель (" + pct + "%)"});
  });
  if (missed.length > 4) tps.push({icon:"ti-dots", col:"#ff5c7a", text:"Ещё " + (missed.length-4) + " задач пропускались"});
  if (tE > 0) tps.push({icon:"ti-alert-triangle", col:"#ff5c7a", text: tE + " ошибок — разобрать конкретные случаи"});
  remarks.forEach(function(r) { tps.push({icon:"ti-alert-circle", col:"#ff5c7a", text:r.text}); });
  if (ep > 0 && ep < 70) tps.push({icon:"ti-trending-down", col:"#f0a44a", text:"Оценка " + ep + "% — обсудить план улучшения"});
  if (ep >= 85) tps.push({icon:"ti-star", col:"#4ede8a", text:"Отличная оценка " + ep + "% — отметить и похвалить"});
  achieves.forEach(function(a) { tps.push({icon:"ti-star", col:"#4ede8a", text:a.text}); });
  ideas.forEach(function(id)   { tps.push({icon:"ti-bulb", col:"#8b84ff", text:"Идея: " + id.text}); });
  if (tps.length === 0) tps.push({icon:"ti-circle-check", col:"#4ede8a", text:"Нареканий нет. Отметить хорошую работу."});

  var h = "<div class=\"rep-card\" style=\"border-top:3px solid " + gc + "\">"
    + "<div class=\"rep-hdr\"><div class=\"rep-ava\" style=\"background:" + emp.col + ";color:" + emp.tc + "\">" + emp.ini + "</div>"
    + "<div><div class=\"rep-name\" style=\"color:" + emp.tc + "\">" + emp.name + "</div><div class=\"rep-role\">" + emp.role + "</div></div>"
    + "<div class=\"rep-score-wrap\">"
    + (ep > 0 ? "<div class=\"rep-score-val\" style=\"color:" + est.tc + "\">" + ep + "%</div><div class=\"rep-score-lbl\">" + est.label + "</div>"
              : "<div class=\"rep-score-val\" style=\"color:#555d80\">—</div><div class=\"rep-score-lbl\">нет оценки</div>")
    + "</div></div><div class=\"rep-body\">"
    + "<div class=\"kpi3\">"
    + "<div class=\"kpi3-box\"><div class=\"kpi3-l\">Счетов</div><div class=\"kpi3-v\" style=\"color:#60aaff\">" + tS + "</div></div>"
    + "<div class=\"kpi3-box\"><div class=\"kpi3-l\">Подозрит.</div><div class=\"kpi3-v\" style=\"color:" + (tP>0?"#f0a44a":"#555d80") + "\">" + tP + "</div></div>"
    + "<div class=\"kpi3-box\"><div class=\"kpi3-l\">Ошибки</div><div class=\"kpi3-v\" style=\"color:" + (tE>0?"#ff5c7a":"#555d80") + "\">" + tE + "</div></div>"
    + "</div>";

  if (missed.length > 0) {
    h += "<div class=\"rep-sec\"><div class=\"rep-sec-title\"><i class=\"ti ti-trending-down\" style=\"color:#ff5c7a\"></i> Невыполненные задачи (" + missed.length + ")</div>";
    missed.forEach(function(t) {
      var pct = Math.round(t.done.length/w.length*100);
      var col = pct===0?"#ff5c7a":pct<50?"#f0a44a":"#4ede8a";
      h += "<div class=\"task-bar-row\" style=\"background:rgba(255,92,122,.08);border:1px solid rgba(255,92,122,.2)\">"

function calcFinalScore(ei) {
  var weeks = gw(cm), ep = mCalcEval(ei), tasks = mGetTasks(ei), doneSum = 0, taskTotal = 0;
  weeks.forEach(function(_,wi){ tasks.forEach(function(_,ti){ taskTotal++; if(mGetDone(ei,wi,ti)) doneSum++; }); });
  var taskPct = taskTotal > 0 ? doneSum/taskTotal*100 : 0, totE = 0;
  weeks.forEach(function(_,wi){ totE += mGetKPI(ei,wi,"e"); });
  return Math.round((ep*0.40 + taskPct*0.35 + Math.max(0,100-totE*5)*0.25) * 10) / 10;
}

function autoChar(ei) {
  var s = calcFinalScore(ei), ep = mCalcEval(ei), est = mStatus(ep);
  var weeks = gw(cm), totE = 0, totS = 0;
  weeks.forEach(function(_,wi){ totE += mGetKPI(ei,wi,"e"); totS += mGetKPI(ei,wi,"s"); });
  var shS = SHIFTS[ei].reduce(function(a,v){return a+v;},0);
  var notes = mGetNotes(ei), ach = notes.filter(function(n){return n.type==="achieve";}), g = GRADES[ei];
  var base = g==="Синьор" ? "Лидер команды с исключительными показателями." : "Высокие результаты по всем метрикам.";
  if (s >= 85) return base + " Оценка: " + est.label + "." + (ach.length>0 ? " "+ach[0].text+"." : "") + " Профессионален.";
  if (s >= 70) return "Стабильный специалист. Счетов: "+(totS+shS)+". "+(totE===0?"Ошибок нет.":totE+" ошибки.")+" Оценка: "+est.label+".";
  if (s >= 50) return "Работает в штатном режиме. Оценка: " + est.label + ". Требуется поддержка.";
  return "Результаты ниже ожидаемого. Необходимо обсудить план развития.";
}
function autoRec(ei) {
  var s = calcFinalScore(ei), weeks = gw(cm), totE = 0;
  weeks.forEach(function(_,wi){ totE += mGetKPI(ei,wi,"e"); });
  var notes = mGetNotes(ei), ideas = notes.filter(function(n){return n.type==="idea";}), g = GRADES[ei];
  if (s >= 85) return g==="Мидл" ? "Рассмотреть повышение до Синьора. Назначить менторские задачи." : "Рассмотреть на роль тимлида. Поощрение за экспертность.";
  if (s >= 70) return ideas.length>0 ? "Поощрить инициативу. "+ideas[0].text : "Рекомендовано премирование. Поддерживать темп.";
  if (s >= 50) return totE>2 ? "Разобрать ошибки индивидуально. Усилить контроль." : "Пройти тренинг. Контроль задач еженедельно.";
  return "Составить ИПР. Провести аттестацию при необходимости.";
}

function drawDonutCanvas(canvas) {
  if (!canvas) return;
  var totals = canvas.getAttribute("data-totals").split(",").map(Number);
  var colors = canvas.getAttribute("data-colors").split(",");
  var grand  = Number(canvas.getAttribute("data-grand"));
  var center = canvas.getAttribute("data-center") || "";
  var ctx = canvas.getContext("2d");
  var W = canvas.width, H = canvas.height;
  var cx = W/2, cy = H/2, R = Math.min(W,H)*0.42, r = R*0.58;
  ctx.clearRect(0,0,W,H);
  if (grand === 0) {
    ctx.fillStyle = "#555d80";
    ctx.font = "13px Manrope,sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Нет данных", cx, cy);
    return;
  }
  var angle = -Math.PI/2;
  totals.forEach(function(v,i){
    if (v === 0) return;
    var slice = (v/grand)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    angle += slice;
  });
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue("--bg2").trim() || "#181c27";
  ctx.fill();
  ctx.fillStyle = "#e8eaf6";
  ctx.font = "bold 18px Manrope,sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(grand, cx, cy-8);
  ctx.font = "11px Manrope,sans-serif";
  ctx.fillStyle = "#8b91b3";
  ctx.fillText(center, cx, cy+10);
}
function renderDonut() {
  drawDonutCanvas(document.getElementById("donutChart"));
  drawDonutCanvas(document.getElementById("donutChartP"));
}

function buildMiniChart(emp, ei, weeks) {

  var totalP = valsP.reduce(function(a,v){return a+v;},0);

  var ep = mCalcEval(ei), est = mStatus(ep);

  var bars = weeks.map(function(_,wi) {
    var s  = vals[wi],  hS = Math.max(2, Math.round((s/maxV)*50));
    var p  = valsP[wi], hP = p>0 ? Math.max(2, Math.round((p/maxV)*50)) : 0;

      + "<div style=\"height:"+hS+"px;background:"+colS+";border-radius:2px 2px 0 0\" title=\"Нед."+(wi+1)+": "+s+" счетов\"></div>"
      + "</div>";

  var lbls = weeks.map(function(_,i){ return "<span class=\"spark-lbl\">Н"+(i+1)+"</span>"; }).join("");

  return "<div class=\"mc-chart-card\" style=\"border-left:3px solid "+GC[emp.g]+"\">"
    + "<div class=\"mc-chart-hdr\"><div class=\"mc-chart-av\" style=\"background:"+emp.col+";color:"+emp.tc+"\">"+emp.ini+"</div>"
    + "<div style=\"flex:1;min-width:0\"><div class=\"mc-chart-name\">"+emp.name+"</div>"
    + (ep>0?"<span style=\"font-size:10px;font-weight:700;color:"+est.tc+"\">"+ep+"% "+est.label+"</span>":"<span style=\"font-size:10px;color:var(--text3)\">Нет оценки</span>")
    + "</div></div>"
    + "<div style=\"display:flex;gap:12px;margin-bottom:7px\">"
    + "<span style=\"font-size:11px;color:var(--text3)\"><span style=\"color:#60aaff;font-weight:700\">"+totalS+"</span> счетов</span>"
    + "<span style=\"font-size:11px;color:var(--text3)\"><span style=\"color:#b47aff;font-weight:700\">"+totalP+"</span> подозрит.</span>"
    + "</div>"
    + "<div style=\"display:flex;align-items:flex-end;gap:3px;height:56px\">"+bars+"</div>"

function buildEmpCharts(emp, ei, weeks) {

  var suspects = weeks.map(function(_,wi){ return mGetKPI(ei,wi,"p"); });
  var tasks = mGetTasks(ei);
  var taskPcts = weeks.map(function(_,wi){
    var d=0; tasks.forEach(function(_,ti){ if(mGetDone(ei,wi,ti)) d++; });

  var dIM = new Date(2026,cm+1,0).getDate(), shV = SHIFTS[ei].slice(0,dIM);
  var maxS = Math.max(1,Math.max.apply(null,scores)), maxP = Math.max(1,Math.max.apply(null,suspects)), maxSh = Math.max(1,Math.max.apply(null,shV));

  function li(col,lbl){return"<div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:"+col+"\"></div>"+lbl+"</div>";}
  var wL = weeks.map(function(_,i){return"<span class=\"spark-lbl\">Н"+(i+1)+"</span>";}).join("");
  var dL = shV.map(function(_,i){return"<span class=\"spark-lbl\">"+(i+1)+"</span>";}).join("");

  var tB = mkB(taskPcts,100,100,function(v){return v>=85?"#4ede8a":v>=60?"#60aaff":v>=40?"#f0a44a":"#ff5c7a";},function(v,i){return"Нед."+(i+1)+": "+v+"% задач";});
  var pB = mkB(suspects,maxP,80,function(){return"#b47aff";},function(v,i){return"Нед."+(i+1)+": "+v+" подозрит.";});
  var shB= mkB(shV,maxSh,80,function(v){return v>0?"#4ede8a":"rgba(255,255,255,.06)";},function(v,i){return"День "+(i+1)+": "+v+" счетов";});
  return "<div class=\"chart-wrap\"><div class=\"chart-title\"><span style=\"color:"+gc+";font-weight:700\">"+emp.name+"</span> — Счетов по неделям<div class=\"chart-legend\">"+li("#60aaff","Без ошибок")+li("#f0a44a","С ошибками")+"</div></div><div style=\"display:flex;align-items:flex-end;gap:4px;height:110px\">"+sB+"</div><div style=\"display:flex;gap:4px\">"+wL+"</div></div>"

function addEmployee(empObj) {
  // Expand EMP
  EMP.push(empObj);
  var ei = EMP.length - 1;
  // Expand ST, NO, GRADES, RECS, CHARS, SHIFTS, slt
  var weeks = gw(cm);
  var newWeeks = Array.from({length:6}, function() {
    return {tasks: DT[empObj.g].map(function(){return false;}), tt:[...DT[empObj.g]], s:0, p:0, e:0, cm:""};
  });
  ST.push(newWeeks);
  NO.push([]);
  if (typeof GRADES !== "undefined") { GRADES.push("Мидл"); RECS.push(""); CHARS.push(""); SHIFTS.push(Array.from({length:31},function(){return 0;})); }
  if (typeof slt !== "undefined") slt.push("achieve");
  // Expand EV for all months
  for (var m=0; m<12; m++) {
    if (!EV[m]) EV[m] = [];
    EV[m].push((CR||[]).map(function(){return 0;}));
  }
  saveAll();
  refreshAllViews();
}

function editEmployee(ei, empObj) {
  EMP[ei] = empObj;
  saveAll();
  refreshAllViews();
}

function confirmDeleteEmp(ei) {
  var emp = EMP[ei];
  if (!confirm("Удалить сотрудника \"" + emp.name + "\"?\nВсе его данные будут удалены. Это действие необратимо.")) return;
  deleteEmployee(ei);
}

function deleteEmployee(ei) {
  EMP.splice(ei, 1);
  ST.splice(ei, 1);
  NO.splice(ei, 1);
  if (typeof GRADES !== "undefined") { GRADES.splice(ei,1); RECS.splice(ei,1); CHARS.splice(ei,1); SHIFTS.splice(ei,1); }
  if (typeof slt !== "undefined") slt.splice(ei, 1);
  for (var m=0; m<12; m++) { if (EV[m]) EV[m].splice(ei, 1); }
  // Reset curEmp if needed
  if (typeof ce2 !== "undefined" && ce2 >= EMP.length) ce2 = 0;
  if (typeof anChartEmp !== "undefined" && anChartEmp >= EMP.length) anChartEmp = "all";
  if (typeof mCurEmp !== "undefined" && mCurEmp >= EMP.length) mCurEmp = "all";
  saveAll();
  refreshAllViews();
  renderSettings();
}

// Load saved EMP on startup
(function() {
  try {
    var raw = localStorage.getItem("lc_emp");
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved && saved.length > 0) {
      // Replace EMP contents
      EMP.length = 0;
      saved.forEach(function(e) { EMP.push(e); });
      // Ensure NO, ST, GRADES etc match new EMP length
      while(NO.length < EMP.length) NO.push([]);
      while(ST.length < EMP.length) ST.push(Array.from({length:6},()=>({tasks:[],tt:[],s:0,p:0,e:0,cm:''})));
      if(typeof GRADES !== 'undefined') while(GRADES.length < EMP.length) GRADES.push('Мидл');
      if(typeof RECS   !== 'undefined') while(RECS.length   < EMP.length) RECS.push('');
      if(typeof CHARS  !== 'undefined') while(CHARS.length  < EMP.length) CHARS.push('');
    }
  } catch(e) {}
})();


// ── FIREBASE SYNC ──────────────────────────────────────────
var _fbDB = null;

function _fbInit() {
  if (_fbDB) return;
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyB7Ean5vnuwP_a_oqjbBushwy-GSw-Obv8",
      authDomain: "manager-app-3a8cc.firebaseapp.com",
      databaseURL: "https://manager-app-3a8cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "manager-app-3a8cc",
      storageBucket: "manager-app-3a8cc.firebasestorage.app",
      messagingSenderId: "590082100351",
      appId: "1:590082100351:web:4492467aa7961ea3cc434a"
    });
  } catch(e) {}
  try { _fbDB = firebase.database(); } catch(e) { console.log('FB db error:', e); }
}

function _fbPush() {
  try {
    _fbInit();
    if (!_fbDB) { console.log('FB not ready'); return; }
    var analysis = {};
    try { analysis = JSON.parse(localStorage.getItem('lc_analysis') || '{}'); } catch(e) {}
    var emp = EMP.slice();
    try { var e2 = JSON.parse(localStorage.getItem('lc_emp')); if(e2&&e2.length) emp=e2; } catch(e) {}
    var data = {
      ST: ST, EV: EV, NO: NO, CR: CR, slt: slt, cm: cm,
      EMP: emp,
      GRADES: analysis.GRADES || {},
      RECS:   analysis.RECS   || {},
      CHARS:  analysis.CHARS  || {},
      SHIFTS: analysis.SHIFTS || {},
      _ts: Date.now()
    };
    _fbDB.ref('dashboard_data').set(data).then(function(){
      console.log('FB push OK');
    }).catch(function(e){ console.log('FB push error:', e); });
  } catch(e) { console.log('_fbPush error:', e); }
}

// On load: compare timestamps, load newer data
window.addEventListener('load', function() {
  setTimeout(function() {
    _fbInit();
    if (!_fbDB) { setTimeout(_fbPush, 1000); return; }

    _fbDB.ref('dashboard_data').once('value').then(function(snap) {
      var remote = snap.val();
      if (!remote) { _fbPush(); return; }

      // Get local timestamp
      var localTS = 0;
      try {
        var raw = localStorage.getItem('lc_v10');
        if (raw) { var d = JSON.parse(raw); localTS = d._ts || 0; }
      } catch(e) {}

      var remoteTS = remote._ts || 0;
      console.log('Local TS:', localTS, 'Remote TS:', remoteTS);

      if (localTS === 0) {
        // No local data at all - this is a new device, load from Firebase
        console.log('New device - loading from Firebase...');
        _fbApply(remote);
      } else if (remoteTS > localTS + 30000) {
        // Remote is newer by more than 30 seconds AND local exists
        // Show sync button instead of auto-applying
        _showSyncBanner(remote, remoteTS);
        _fbPush();
      } else {
        // Local is same or newer - push to Firebase  
        console.log('Local is current - pushing to Firebase...');
        _fbPush();
      }
    }).catch(function(e) {
      console.log('FB read error:', e);
      _fbPush();
    });
  }, 1500);
});

function _closeSyncBanner() {
  var b = document.getElementById('fbSyncBanner'); if(b) b.remove();
}
function _applySyncBanner() {
  _fbApply(window._fbRemoteData); _closeSyncBanner();
}
function _showSyncBanner(remoteData, remoteTS) {
  if (document.getElementById('fbSyncBanner')) return;
  window._fbRemoteData = remoteData;
  var banner = document.createElement('div');
  banner.id = 'fbSyncBanner';
  banner.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;background:#1e2235;border:1px solid rgba(108,99,255,.5);border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);font-family:Manrope,sans-serif';
  var dt = new Date(remoteTS).toLocaleString('ru');
  var span = document.createElement('span');
  span.style.cssText = 'font-size:13px;color:#e8eaf6';
  span.innerHTML = '&#9729;&#65039; Данные из Firebase от <strong>' + dt + '</strong>';
  var btn1 = document.createElement('button');
  btn1.textContent = 'Загрузить';
  btn1.style.cssText = 'background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Manrope,sans-serif';
  btn1.onclick = _applySyncBanner;
  var btn2 = document.createElement('button');
  btn2.textContent = 'Оставить своё';
  btn2.style.cssText = 'background:#1e2235;color:#8b91b3;border:1px solid #2a2f45;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:Manrope,sans-serif';
  btn2.onclick = _closeSyncBanner;
  banner.appendChild(span);
  banner.appendChild(btn1);
  banner.appendChild(btn2);
  document.body.appendChild(banner);
}

function _fbApply(data) {
  try {
    // Mutate arrays (let/const variables)
    if (data.ST) {
      var st2 = Array.isArray(data.ST) ? data.ST : Object.values(data.ST);
      ST.length = 0;
      st2.forEach(function(row) { ST.push(Array.isArray(row) ? row : Object.values(row)); });
    }
    if (data.EV) {
      var ev2 = Array.isArray(data.EV) ? data.EV : Object.values(data.EV);
      EV.length = 0;
      ev2.forEach(function(month) {
        var m2 = Array.isArray(month) ? month : Object.values(month);
        EV.push(m2.map(function(ei) { return Array.isArray(ei) ? ei : Object.values(ei||{}); }));
      });
    }
    if (data.NO) {
      var no2 = Array.isArray(data.NO) ? data.NO : Object.values(data.NO);
      NO.length = 0;
      no2.forEach(function(n) { NO.push(Array.isArray(n) ? n : Object.values(n||{})); });
    }
    if (data.CR) {
      var cr2 = Array.isArray(data.CR) ? data.CR : Object.values(data.CR);
      CR.length = 0;
      cr2.forEach(function(r) { CR.push(r); });
    }
    if (data.slt !== undefined) slt = parseInt(data.slt) || 0;
    if (data.cm != null) cm = data.cm;
    if (data.EMP && data.EMP.length > 0) {
      var emp2 = Array.isArray(data.EMP) ? data.EMP : Object.values(data.EMP);
      EMP.length = 0;
      emp2.forEach(function(e) { EMP.push(e); });
    }
    if (data.GRADES) GRADES = Array.isArray(data.GRADES) ? data.GRADES : Object.values(data.GRADES);
    if (data.RECS)   RECS   = Array.isArray(data.RECS)   ? data.RECS   : Object.values(data.RECS);
    if (data.CHARS)  CHARS  = Array.isArray(data.CHARS)  ? data.CHARS  : Object.values(data.CHARS);
    if (data.SHIFTS) SHIFTS = Array.isArray(data.SHIFTS) ? data.SHIFTS : Object.values(data.SHIFTS);

    // Ensure arrays match EMP length
    while(NO.length < EMP.length) NO.push([]);
    while(ST.length < EMP.length) ST.push(Array.from({length:6},function(){return {tasks:[],tt:[],s:0,p:0,e:0,cm:''}}));

    // Save to localStorage
    try {
      localStorage.setItem('lc_v10', JSON.stringify({ST:ST,EV:EV,NO:NO,CR:CR,slt:slt,cm:cm,_ts:data._ts||Date.now()}));
      localStorage.setItem('lc_analysis', JSON.stringify({GRADES:GRADES,RECS:RECS,CHARS:CHARS,SHIFTS:SHIFTS}));
      if (data.EMP) localStorage.setItem('lc_emp', JSON.stringify(EMP));
    } catch(e) {}

    // Re-render
    try {
      var msEl = document.getElementById('ms');
      if (msEl) msEl.value = slt;
      if(typeof rwt==='function') rwt();
      if(typeof rss==='function') rss();
      if(typeof rg ==='function') rg();
      if(typeof rsm==='function') rsm();
      if(typeof rc ==='function') rc();
      if(typeof re ==='function') re();
      if(typeof ugb==='function') ugb();
    } catch(e) { console.log('render error:', e); }

    console.log('Firebase data applied!');
  } catch(e) { console.log('_fbApply error:', e); }
}
